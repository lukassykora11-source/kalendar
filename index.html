<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prázdninový kalendář 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{
    --bg:#FCFAF4; --ink:#2A2D2C; --muted:#6E726F; --line:#E6E2D6;
    --card:#FFFFFF; --accent:#E8543C; --accent-soft:#FBE7E2;
    --tata:#3D5655; --tata-soft:#E2EAE9;
    --mama:#C1577F; --mama-soft:#F6E4EC;
    --krystof:#3B7BC4; --krystof-soft:#E2EDF8;
    --viny:#D98A1F; --viny-soft:#F8ECD6;
    --vsichni:#5B8A3C; --vsichni-soft:#E8F0DF;
    --radius:14px; --radius-sm:9px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--ink);}
  body{padding-bottom:90px;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;font-size:16px;}

  /* ---------- header ---------- */
  header{
    position:sticky;top:0;z-index:30;background:var(--bg);
    border-bottom:1px solid var(--line);
    padding:14px 16px 10px;
  }
  .brand{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .brand h1{font-size:19px;margin:0;font-weight:700;letter-spacing:-.3px;}
  .brand .sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .who-btn{
    display:flex;align-items:center;gap:7px;background:var(--card);
    border:1px solid var(--line);border-radius:30px;padding:5px 12px 5px 6px;font-size:13px;font-weight:600;
  }
  .who-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;}

  /* ---------- filter chips ---------- */
  .filters{display:flex;gap:7px;overflow-x:auto;padding:11px 16px 4px;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;border:1px solid var(--line);background:var(--card);
    border-radius:30px;padding:7px 13px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;
    transition:.12s;white-space:nowrap;
  }
  .chip .cd{width:11px;height:11px;border-radius:50%;}
  .chip.active{color:#fff;border-color:transparent;}

  /* ---------- month nav ---------- */
  .monthnav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 2px;}
  .monthnav h2{font-size:17px;margin:0;font-weight:700;text-transform:capitalize;}
  .navbtn{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--line);font-size:18px;display:flex;align-items:center;justify-content:center;}

  /* ---------- views ---------- */
  .viewtoggle{display:flex;gap:0;background:var(--card);border:1px solid var(--line);border-radius:30px;padding:3px;margin:0 16px;}
  .viewtoggle button{flex:1;padding:7px;font-size:13px;font-weight:600;border-radius:30px;color:var(--muted);}
  .viewtoggle button.active{background:var(--ink);color:#fff;}

  main{padding:12px 16px 0;}

  /* ---------- grid (PC) ---------- */
  .grid-head{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;}
  .grid-head span{text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cell{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);
    min-height:96px;padding:6px;display:flex;flex-direction:column;gap:3px;position:relative;overflow:hidden;
  }
  .cell.empty{background:transparent;border:none;}
  .cell.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset;}
  .cell.weekend{background:#FBF8F0;}
  .cell.holiday{background:var(--accent-soft);}
  .cell .dn{font-size:12px;font-weight:700;color:var(--muted);}
  .cell.today .dn{color:var(--accent);}
  .cell .ev{font-size:11px;line-height:1.25;border-radius:6px;padding:2px 5px;color:#fff;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:3px;}
  .cell .ev .pic{font-size:9px;opacity:.85;}
  .cell .more{font-size:10px;color:var(--muted);font-weight:600;}
  .holtag{position:absolute;top:5px;right:5px;font-size:9px;color:var(--accent);font-weight:700;}

  /* ---------- list (mobile-friendly agenda) ---------- */
  .agenda{display:flex;flex-direction:column;gap:18px;}
  .day-group .dghead{display:flex;align-items:baseline;gap:9px;margin-bottom:8px;padding-left:2px;}
  .dghead .dnum{font-size:22px;font-weight:800;line-height:1;}
  .dghead .dmeta{font-size:12px;color:var(--muted);font-weight:600;text-transform:capitalize;}
  .dghead.today .dnum{color:var(--accent);}
  .dghead .holiday-pill{font-size:10px;background:var(--accent-soft);color:var(--accent);font-weight:700;padding:2px 8px;border-radius:20px;}
  .acard{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:11px 13px;display:flex;gap:11px;margin-bottom:7px;position:relative;
  }
  .acard .bar{width:4px;border-radius:4px;flex:0 0 auto;}
  .acard .body{flex:1;min-width:0;}
  .acard .t{font-size:15px;font-weight:700;margin-bottom:2px;}
  .acard .meta{font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .acard .who-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
  .acard .note{font-size:13px;color:#4A4D4C;margin-top:6px;white-space:pre-wrap;}
  .acard .photos{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .acard .photos img{width:62px;height:62px;object-fit:cover;border-radius:8px;border:1px solid var(--line);}
  .empty-day{font-size:13px;color:var(--muted);font-style:italic;padding:4px 2px;}

  .agenda-empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .agenda-empty .big{font-size:38px;margin-bottom:8px;}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;right:18px;bottom:22px;z-index:40;width:60px;height:60px;border-radius:50%;
    background:var(--accent);color:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 20px rgba(232,84,60,.4);
  }

  /* ---------- modal/sheet ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,20,18,.45);z-index:50;display:none;align-items:flex-end;justify-content:center;}
  .overlay.open{display:flex;}
  .sheet{
    background:var(--bg);width:100%;max-width:520px;border-radius:22px 22px 0 0;
    padding:8px 18px 26px;max-height:92vh;overflow-y:auto;animation:up .22s ease;
  }
  @keyframes up{from{transform:translateY(40px);opacity:.6;}to{transform:none;opacity:1;}}
  .grab{width:42px;height:5px;background:var(--line);border-radius:5px;margin:6px auto 14px;}
  .sheet h3{margin:0 0 14px;font-size:18px;font-weight:800;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
  .field input,.field select,.field textarea{
    width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:11px 12px;color:var(--ink);
  }
  .field textarea{min-height:70px;resize:vertical;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);}
  .whopick{display:flex;gap:8px;flex-wrap:wrap;}
  .whopick button{
    flex:1;min-width:calc(33% - 8px);border:1.5px solid var(--line);background:var(--card);border-radius:var(--radius-sm);
    padding:10px 6px;font-size:13px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.12s;
  }
  .whopick button .av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;}
  .whopick button.sel{border-color:var(--ink);background:#fff;}
  .photo-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .photo-thumb{position:relative;width:70px;height:70px;}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;border-radius:9px;border:1px solid var(--line);}
  .photo-thumb .rm{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .addphoto{width:70px;height:70px;border:1.5px dashed var(--line);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--muted);background:var(--card);}
  .sheet-actions{display:flex;gap:10px;margin-top:8px;}
  .btn{flex:1;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;text-align:center;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-ghost{background:var(--card);border:1px solid var(--line);color:var(--ink);}
  .btn-danger{background:#fff;border:1px solid #E9B7AF;color:var(--accent);flex:0 0 auto;padding:14px 18px;}

  /* config screen */
  .config{max-width:480px;margin:30px auto;padding:0 20px;}
  .config h2{font-size:20px;}
  .config .hint{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:18px;}
  .config code{background:#EEEAE0;padding:1px 5px;border-radius:4px;font-size:12px;}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:30px;font-size:13px;font-weight:600;z-index:80;opacity:0;transition:.25s;pointer-events:none;}
  .toast.show{opacity:1;}
  .syncing{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
  .dotpulse{width:7px;height:7px;border-radius:50%;background:var(--vsichni);}

  /* ---------- hero (next event, quiet) ---------- */
  .hero{margin:12px 16px 0;}
  .hero-card{
    background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:var(--radius);
    padding:13px 16px;display:flex;align-items:center;gap:14px;position:relative;
  }
  .hero-card .big-num{font-size:30px;font-weight:800;line-height:1;letter-spacing:-1px;color:var(--tata);flex:0 0 auto;min-width:34px;text-align:center;}
  .hero-card .hero-txt{flex:1;min-width:0;}
  .hero-card .hero-lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .hero-card .hero-main{font-size:16px;font-weight:700;margin-top:1px;line-height:1.25;}
  .hero-card .hero-sub{font-size:12px;color:var(--muted);margin-top:2px;}

  /* ---------- stats strip ---------- */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 16px 0;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 6px;text-align:center;}
  .stat .sv{font-size:20px;font-weight:800;}
  .stat .sl{font-size:9.5px;color:var(--muted);font-weight:600;margin-top:1px;text-transform:uppercase;letter-spacing:.2px;line-height:1.2;}

  /* ---------- memories timeline ---------- */
  .timeline{position:relative;padding:8px 0 30px 0;}
  .tl-line{position:absolute;left:20px;top:0;bottom:0;width:2px;background:var(--line);}
  .tl-item{position:relative;padding-left:50px;margin-bottom:26px;}
  .tl-dot{position:absolute;left:11px;top:4px;width:20px;height:20px;border-radius:50%;border:3px solid var(--bg);z-index:2;}
  .tl-date{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:capitalize;}
  .tl-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .tl-photos{display:grid;gap:2px;}
  .tl-photos.p1{grid-template-columns:1fr;}
  .tl-photos.p2{grid-template-columns:1fr 1fr;}
  .tl-photos.p3,.tl-photos.p4{grid-template-columns:1fr 1fr;}
  .tl-photos img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
  .tl-photos.p1 img{max-height:280px;}
  .tl-photos.p2 img,.tl-photos.p3 img,.tl-photos.p4 img{height:130px;}
  .tl-photos.p3 img:first-child{grid-row:span 2;height:262px;}
  .tl-body{padding:11px 13px;}
  .tl-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .tl-meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
  .tl-note{font-size:13px;color:#4A4D4C;margin-top:7px;white-space:pre-wrap;}
  .tl-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
  .memories-empty{text-align:center;padding:50px 22px;color:var(--muted);}
  .memories-empty .big{font-size:40px;margin-bottom:10px;}

  /* ---------- stars ---------- */
  .stars{display:flex;align-items:center;gap:3px;margin-top:9px;}
  .star{font-size:20px;line-height:1;background:none;border:none;padding:0;color:#D8D3C4;transition:transform .12s;}
  .star.lit{color:#F2B705;}
  .star:active{transform:scale(1.3);}
  .star-count{font-size:12px;color:var(--muted);margin-left:5px;font-weight:600;}

  /* lightbox */
  .lightbox{position:fixed;inset:0;background:rgba(10,10,8,.92);z-index:90;display:none;align-items:center;justify-content:center;padding:20px;}
  .lightbox.open{display:flex;}
  .lightbox img{max-width:100%;max-height:90vh;border-radius:10px;}
  .lightbox .lb-close{position:absolute;top:18px;right:20px;color:#fff;font-size:34px;background:none;border:none;}

  /* date range + place */
  .daterow{display:flex;align-items:center;gap:10px;}
  .daterow input{flex:1;}
  .dto{font-size:12px;color:var(--accent);font-weight:700;cursor:pointer;white-space:nowrap;flex:0 0 auto;}
  .placehint{font-size:12px;color:var(--muted);margin-top:6px;min-height:16px;}
  .placehint.ok{color:var(--vsichni);}
  .placehint.err{color:var(--accent);}

  /* multi-day pill in month grid */
  .cell .ev.multi{border-left:3px solid rgba(255,255,255,.6);}
  .acard .place,.tl-place{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:3px;}

  /* map view */
  #famMap{height:62vh;min-height:380px;border-radius:var(--radius);border:1px solid var(--line);overflow:hidden;}
  .map-empty{text-align:center;padding:50px 22px;color:var(--muted);}
  .map-empty .big{font-size:40px;margin-bottom:10px;}
  .map-legend{font-size:12px;color:var(--muted);margin-top:10px;text-align:center;}
  .leaflet-popup-content{font-family:inherit;font-size:13px;margin:10px 12px;}
  .leaflet-popup-content b{font-size:14px;}

  @media(min-width:560px){ body{padding-bottom:30px;} }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div>
      <h1>Prázdninový kalendář <span style="color:var(--accent)">2026</span></h1>
      <div class="sub" id="syncStatus">Společný rodinný plán</div>
    </div>
    <button class="who-btn" id="meBtn">
      <span class="who-dot" id="meDot">?</span>
      <span id="meName">Kdo jsem</span>
    </button>
  </div>
</header>

<div class="hero" id="hero"></div>

<div class="filters" id="filters"></div>

<div class="viewtoggle">
  <button id="vMonth" class="active">Měsíc</button>
  <button id="vList">Seznam</button>
  <button id="vMemories">Vzpomínky</button>
  <button id="vMap">Mapa</button>
</div>

<div class="monthnav" id="monthnav">
  <button class="navbtn" id="prevM">‹</button>
  <h2 id="monthLabel"></h2>
  <button class="navbtn" id="nextM">›</button>
</div>

<main id="main"></main>

<button class="fab" id="fab">+</button>

<!-- event sheet -->
<div class="overlay" id="evOverlay">
  <div class="sheet">
    <div class="grab"></div>
    <h3 id="evTitle">Nová aktivita</h3>
    <div class="field">
      <label>Co se děje</label>
      <input id="fTitle" placeholder="Např. Výlet do ZOO" autocomplete="off">
    </div>
    <div class="field">
      <label>Datum</label>
      <div class="daterow">
        <input id="fDate" type="date">
        <span class="dto" id="dtoToggle" title="Přidat konec">→ <span id="dtoLabel">+ víc dní</span></span>
      </div>
      <div id="endWrap" style="display:none;margin-top:8px">
        <label style="font-size:11px">Konec (vícedenní akce)</label>
        <input id="fEndDate" type="date">
      </div>
    </div>
    <div class="field">
      <label>Čas (nepovinné)</label>
      <input id="fTime" type="time">
    </div>
    <div class="field">
      <label>Místo (nepovinné)</label>
      <input id="fPlace" placeholder="Např. Dolní Poustevna" autocomplete="off">
      <div class="placehint" id="placeHint"></div>
    </div>
    <div class="field">
      <label>Koho se to týká</label>
      <div class="whopick" id="whoPick"></div>
    </div>
    <div class="field">
      <label>Poznámka</label>
      <textarea id="fNote" placeholder="Detaily, místo, co s sebou…"></textarea>
    </div>
    <div class="field">
      <label>Fotky</label>
      <div class="photo-row" id="photoRow">
        <button class="addphoto" id="addPhoto">+</button>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    </div>
    <div class="sheet-actions">
      <button class="btn btn-danger" id="delBtn" style="display:none">Smazat</button>
      <button class="btn btn-ghost" id="cancelBtn">Zrušit</button>
      <button class="btn btn-primary" id="saveBtn">Uložit</button>
    </div>
  </div>
</div>

<!-- who am i sheet -->
<div class="overlay" id="whoOverlay">
  <div class="sheet">
    <div class="grab"></div>
    <h3>Kdo používá kalendář?</h3>
    <p style="font-size:13px;color:var(--muted);margin:-6px 0 16px">Vybere se předvyplněně u nových aktivit.</p>
    <div class="whopick" id="meWhoPick"></div>
    <div class="sheet-actions" style="margin-top:18px">
      <button class="btn btn-primary" id="meSaveBtn">Hotovo</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">×</button>
  <img id="lbImg" src="">
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
const iso=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const todayIso=iso(new Date());
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),1900);}

/* ---------- storage: Supabase or local fallback ---------- */
function configured(){return SUPABASE_URL.startsWith("http") && SUPABASE_KEY.length>20;}

async function initStore(){
  if(configured()){
    sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    try{
      const {data,error}=await sb.from("aktivity").select("*").order("date");
      if(error)throw error;
      events=data.map(normalize);
      online=true;
      $("#syncStatus").innerHTML='<span class="syncing"><span class="dotpulse"></span>Synchronizováno · vidí celá rodina</span>';
      // live updates
      sb.channel("aktivity-live").on("postgres_changes",{event:"*",schema:"public",table:"aktivity"},reload).subscribe();
    }catch(e){
      console.error(e);
      $("#syncStatus").textContent="Chyba připojení — kontrola tabulky";
      loadLocal();
    }
  }else{
    loadLocal();
    $("#syncStatus").textContent="Lokální režim (nesdílí se)";
  }
}
function normalize(r){return {id:r.id,title:r.title,date:r.date,end_date:r.end_date||"",time:r.time||"",members:r.members||[],note:r.note||"",photos:r.photos||[],stars:r.stars||0,place:r.place||"",lat:r.lat??null,lng:r.lng??null};}
function loadLocal(){try{events=JSON.parse(localStorage.getItem("famcal_events")||"[]");}catch{events=[];}}
function saveLocal(){localStorage.setItem("famcal_events",JSON.stringify(events));}
async function reload(){
  if(!online)return;
  const {data}=await sb.from("aktivity").select("*").order("date");
  if(data){events=data.map(normalize);render();}
}

async function persistAdd(ev){
  if(online){
    const {data,error}=await sb.from("aktivity").insert([{title:ev.title,date:ev.date,end_date:ev.end_date||null,time:ev.time,members:ev.members,note:ev.note,photos:ev.photos,stars:ev.stars||0,place:ev.place||null,lat:ev.lat,lng:ev.lng}]).select();
    if(error){toast("Nepodařilo se uložit");return null;}
    return normalize(data[0]);
  }else{ev.id=Date.now();events.push(ev);saveLocal();return ev;}
}
async function persistUpdate(ev){
  if(online){
    const {error}=await sb.from("aktivity").update({title:ev.title,date:ev.date,end_date:ev.end_date||null,time:ev.time,members:ev.members,note:ev.note,photos:ev.photos,stars:ev.stars||0,place:ev.place||null,lat:ev.lat,lng:ev.lng}).eq("id",ev.id);
    if(error){toast("Nepodařilo se upravit");return false;}
    return true;
  }else{const i=events.findIndex(e=>e.id===ev.id);events[i]=ev;saveLocal();return true;}
}
async function persistStars(id,stars){
  if(online){await sb.from("aktivity").update({stars}).eq("id",id);}
  else{const e=events.find(e=>e.id===id);if(e){e.stars=stars;saveLocal();}}
}
async function persistDelete(id){
  if(online){await sb.from("aktivity").delete().eq("id",id);}
  else{events=events.filter(e=>e.id!==id);saveLocal();}
}

/* ---------- rendering ---------- */
function visibleEvents(){return filter==="all"?events:events.filter(e=>e.members.includes(filter));}
// covers a given ISO date? (handles multi-day end_date ranges)
function eventOnDate(e,date){
  if(!e.end_date||e.end_date<=e.date)return e.date===date;
  return date>=e.date && date<=e.end_date;
}
// label like "1.–4. července" or "3. července"
function rangeLabel(e){
  const d=new Date(e.date);
  if(!e.end_date||e.end_date<=e.date)return `${d.getDate()}. ${MONTHS[d.getMonth()]}`;
  const d2=new Date(e.end_date);
  if(d.getMonth()===d2.getMonth())return `${d.getDate()}.–${d2.getDate()}. ${MONTHS[d2.getMonth()]}`;
  return `${d.getDate()}. ${MONTHS[d.getMonth()]} – ${d2.getDate()}. ${MONTHS[d2.getMonth()]}`;
}

function render(){
  renderHero();
  renderStats();
  $("#monthLabel").textContent=`${MONTHS[cur.getMonth()]} ${cur.getFullYear()}`;
  $("#monthnav").style.display = (view==="memories"||view==="map") ? "none" : "flex";
  if(view==="month")renderMonth();
  else if(view==="list")renderList();
  else if(view==="memories")renderMemories();
  else renderMap();
}

/* ---------- hero countdown ---------- */
function renderHero(){
  const el=$("#hero");
  const now=new Date();now.setHours(0,0,0,0);
  // upcoming events across all data
  const upcoming=events
    .filter(e=>e.date>=todayIso)
    .sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"").localeCompare(b.time||""));
  const PRAZDNINY_START="2026-06-29";
  const PRAZDNINY_END="2026-08-31";
  const inSummer=todayIso>=PRAZDNINY_START&&todayIso<=PRAZDNINY_END;

  function daysTo(d){return Math.round((new Date(d)-now)/86400000);}
  function dnText(n){return n===1?"den":(n>=2&&n<=4?"dny":"dní");}

  let html="";
  if(upcoming.length){
    const next=upcoming[0];
    const dd=daysTo(next.date);
    const whoTags=next.members.map(id=>M[id].name).join(", ");
    const when=dd===0?"Dnes":dd===1?"Zítra":`Za ${dd} ${dnText(dd)}`;
    html=`<div class="hero-card">
      <div class="big-num">${dd===0?'•':dd}</div>
      <div class="hero-txt">
        <div class="hero-lbl">Další akce · ${when}</div>
        <div class="hero-main">${escapeHtml(next.title)}</div>
        <div class="hero-sub">${whoTags}</div>
      </div>
    </div>`;
  }else if(todayIso<PRAZDNINY_START){
    const dd=daysTo(PRAZDNINY_START);
    html=`<div class="hero-card">
      <div class="big-num">${dd}</div>
      <div class="hero-txt">
        <div class="hero-lbl">Odpočet</div>
        <div class="hero-main">Do prázdnin zbývá ${dd} ${dnText(dd)}</div>
        <div class="hero-sub">Naplánuj první akci tlačítkem +</div>
      </div>
    </div>`;
  }else{
    html=`<div class="hero-card">
      <div class="hero-txt">
        <div class="hero-lbl">${inSummer?'Užíváme léto':'Žádné nadcházející akce'}</div>
        <div class="hero-main">Co podniknete dál?</div>
        <div class="hero-sub">Přidej aktivitu tlačítkem +</div>
      </div>
    </div>`;
  }
  el.innerHTML=html;
}

/* ---------- summer stats ---------- */
function renderStats(){
  let host=$("#statsHost");
  if(!host){
    host=document.createElement("div");host.id="statsHost";
    $("#hero").insertAdjacentElement("afterend",host);
  }
  const total=events.length;
  const photoCount=events.reduce((s,e)=>s+(e.photos?e.photos.length:0),0);
  // who has most activities (exclude vsichni for "winner" fun, but count it)
  const counts={};
  events.forEach(e=>e.members.forEach(id=>{counts[id]=(counts[id]||0)+1;}));
  let topId=null,topN=0;
  ["tata","mama","krystof","viny"].forEach(id=>{if((counts[id]||0)>topN){topN=counts[id];topId=id;}});
  const topName=topId?M[topId].name:"—";
  const starsTotal=events.reduce((s,e)=>s+(e.stars||0),0);

  if(total===0){host.innerHTML="";return;}
  host.className="stats";
  host.innerHTML=`
    <div class="stat"><div class="sv">${total}</div><div class="sl">akcí</div></div>
    <div class="stat"><div class="sv">${photoCount}</div><div class="sl">fotek</div></div>
    <div class="stat"><div class="sv" style="font-size:15px;padding-top:3px">${topName}</div><div class="sl">nejaktivnější</div></div>
    <div class="stat"><div class="sv">${starsTotal>0?'⭐'+starsTotal:'–'}</div><div class="sl">hvězd</div></div>`;
}

function renderMonth(){
  const y=cur.getFullYear(),mo=cur.getMonth();
  const first=new Date(y,mo,1);
  let start=(first.getDay()+6)%7; // monday=0
  const days=new Date(y,mo+1,0).getDate();
  const evs=visibleEvents();
  let html='<div class="grid-head">'+DOW.map(d=>`<span>${d}</span>`).join("")+'</div><div class="grid">';
  for(let i=0;i<start;i++)html+='<div class="cell empty"></div>';
  for(let d=1;d<=days;d++){
    const date=iso(new Date(y,mo,d));
    const dow=new Date(y,mo,d).getDay();
    const wknd=dow===0||dow===6;
    const hol=HOLIDAYS[date];
    const dayEvs=evs.filter(e=>eventOnDate(e,date)).sort((a,b)=>(a.time||"99").localeCompare(b.time||"99"));
    let cls="cell";
    if(date===todayIso)cls+=" today";
    if(hol)cls+=" holiday";else if(wknd)cls+=" weekend";
    html+=`<div class="${cls}" data-date="${date}">`;
    html+=`<span class="dn">${d}</span>`;
    if(hol)html+=`<span class="holtag" title="${hol}">svátek</span>`;
    dayEvs.slice(0,3).forEach(e=>{
      const multi=e.end_date&&e.end_date>e.date;
      const col=e.members.length===1?M[e.members[0]].color:(e.members.includes("vsichni")?M.vsichni.color:"linear-gradient(90deg,"+e.members.map(id=>M[id].raw).join(",")+")");
      const bg=e.members.length>1&&!e.members.includes("vsichni")?`background:linear-gradient(90deg,${e.members.map(id=>M[id].raw).join(",")})`:`background:${col}`;
      html+=`<div class="ev ${multi?'multi':''}" style="${bg}" data-id="${e.id}">${e.photos&&e.photos.length?'<span class="pic">▣</span>':''}${escapeHtml(e.title)}</div>`;
    });
    if(dayEvs.length>3)html+=`<span class="more">+${dayEvs.length-3} dalších</span>`;
    html+=`</div>`;
  }
  html+='</div>';
  $("#main").innerHTML=html;
  $("#main").querySelectorAll(".cell:not(.empty)").forEach(c=>{
    c.addEventListener("click",ev=>{
      const id=ev.target.closest(".ev")?.dataset.id;
      if(id)openEvent(events.find(e=>String(e.id)===id));
      else openNew(c.dataset.date);
    });
  });
}

function renderList(){
  const y=cur.getFullYear(),mo=cur.getMonth();
  const days=new Date(y,mo+1,0).getDate();
  const evs=visibleEvents();
  let groups=[];
  for(let d=1;d<=days;d++){
    const date=iso(new Date(y,mo,d));
    const dayEvs=evs.filter(e=>eventOnDate(e,date)).sort((a,b)=>(a.time||"99").localeCompare(b.time||"99"));
    if(dayEvs.length)groups.push({date,d,evs:dayEvs,dow:new Date(y,mo,d).getDay()});
  }
  if(!groups.length){
    $("#main").innerHTML=`<div class="agenda-empty"><div class="big">🏖️</div>Žádné aktivity v tomto měsíci.<br>Klepni na <b>+</b> a něco naplánuj!</div>`;
    return;
  }
  let html='<div class="agenda">';
  groups.forEach(g=>{
    const hol=HOLIDAYS[g.date];
    const dowName=["Neděle","Pondělí","Úterý","Středa","Čtvrtek","Pátek","Sobota"][g.dow];
    html+=`<div class="day-group"><div class="dghead ${g.date===todayIso?'today':''}">
      <span class="dnum">${g.d}.</span>
      <span class="dmeta">${dowName}</span>
      ${hol?`<span class="holiday-pill">${hol}</span>`:''}
    </div>`;
    g.evs.forEach(e=>{
      const barColor=e.members.length===1?M[e.members[0]].raw:M.vsichni.raw;
      const multi=e.end_date&&e.end_date>e.date;
      html+=`<div class="acard" data-id="${e.id}">
        <div class="bar" style="background:${barColor}"></div>
        <div class="body">
          <div class="t">${escapeHtml(e.title)}</div>
          <div class="meta">
            ${multi?`<span>📆 ${rangeLabel(e)}</span>`:''}
            ${e.time?`<span>🕒 ${e.time}</span>`:''}
            ${e.place?`<span class="place">📍 ${escapeHtml(e.place)}</span>`:''}
            ${e.members.map(id=>`<span class="who-tag" style="background:${M[id].soft};color:${M[id].raw}">${M[id].name}</span>`).join("")}
          </div>
          ${e.note?`<div class="note">${escapeHtml(e.note)}</div>`:''}
          ${e.photos&&e.photos.length?`<div class="photos">${e.photos.map(p=>`<img src="${p}">`).join("")}</div>`:''}
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+='</div>';
  $("#main").innerHTML=html;
  $("#main").querySelectorAll(".acard").forEach(c=>{
    c.addEventListener("click",()=>openEvent(events.find(e=>String(e.id)===c.dataset.id)));
  });
}

/* ---------- memories timeline (whole summer, all months) ---------- */
function renderMemories(){
  const evs=visibleEvents()
    .slice()
    .sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"").localeCompare(b.time||""));
  if(!evs.length){
    $("#main").innerHTML=`<div class="memories-empty"><div class="big">📸</div>Zatím žádné vzpomínky.<br>Přidávej fotky k aktivitám a poskládá se z nich příběh prázdnin.</div>`;
    return;
  }
  let html='<div class="timeline"><div class="tl-line"></div>';
  evs.forEach(e=>{
    const dateLabel=rangeLabel(e);
    const dotColor=e.members.length===1?M[e.members[0]].raw:M.vsichni.raw;
    const ph=(e.photos||[]).slice(0,4);
    const pcls="p"+(ph.length||1);
    const stars=e.stars||0;
    html+=`<div class="tl-item">
      <div class="tl-dot" style="background:${dotColor}"></div>
      <div class="tl-date">${dateLabel}${e.time?` · ${e.time}`:''}</div>
      <div class="tl-card" data-id="${e.id}">
        ${ph.length?`<div class="tl-photos ${pcls}">${ph.map(p=>`<img src="${p}" class="lb-trigger">`).join("")}</div>`:''}
        <div class="tl-body">
          <div class="tl-title">${escapeHtml(e.title)}</div>
          <div class="tl-meta">
            ${e.place?`<span class="tl-place">📍 ${escapeHtml(e.place)}</span>`:''}
            ${e.members.map(id=>`<span class="tl-tag" style="background:${M[id].soft};color:${M[id].raw}">${M[id].name}</span>`).join("")}
          </div>
          ${e.note?`<div class="tl-note">${escapeHtml(e.note)}</div>`:''}
          <div class="stars" data-id="${e.id}">
            ${[1,2,3,4,5].map(n=>`<button class="star ${n<=stars?'lit':''}" data-id="${e.id}" data-n="${n}">★</button>`).join("")}
            ${stars?`<span class="star-count">${stars}/5</span>`:'<span class="star-count" style="opacity:.6">ohodnoť</span>'}
          </div>
        </div>
      </div>
    </div>`;
  });
  html+='</div>';
  $("#main").innerHTML=html;
  // photo lightbox
  $("#main").querySelectorAll(".lb-trigger").forEach(img=>{
    img.addEventListener("click",ev=>{ev.stopPropagation();openLightbox(img.src);});
  });
  // open editor when tapping card body (not photos, not stars)
  $("#main").querySelectorAll(".tl-card").forEach(card=>{
    card.querySelector(".tl-body").addEventListener("click",ev=>{
      if(ev.target.closest(".stars"))return;
      openEvent(events.find(e=>String(e.id)===card.dataset.id));
    });
  });
  // star clicks
  $("#main").querySelectorAll(".star").forEach(st=>{
    st.addEventListener("click",async ev=>{
      ev.stopPropagation();
      const id=st.dataset.id, n=+st.dataset.n;
      const e=events.find(x=>String(x.id)===id);
      if(!e)return;
      e.stars=(e.stars===n)?n-1:n;  // tap same star again to lower
      await persistStars(e.id,e.stars);
      render();
    });
  });
}

function openLightbox(src){$("#lbImg").src=src;$("#lightbox").classList.add("open");}

/* ---------- map view ---------- */
let mapInstance=null;
function renderMap(){
  const placed=visibleEvents().filter(e=>e.lat!=null&&e.lng!=null);
  if(!placed.length){
    $("#main").innerHTML=`<div class="map-empty"><div class="big">🗺️</div>Zatím žádná místa na mapě.<br>Přidej k aktivitě <b>Místo</b> (např. „Dolní Poustevna") a objeví se tady.</div>`;
    mapInstance=null;
    return;
  }
  $("#main").innerHTML=`<div id="famMap"></div><div class="map-legend">📍 Místa, kde jste letos byli · ${placed.length}</div>`;
  // Leaflet needs the container in DOM; init after paint
  setTimeout(()=>{
    if(typeof L==="undefined"){$("#famMap").innerHTML='<div class="map-empty">Mapa se nenačetla — zkontroluj připojení k internetu.</div>';return;}
    mapInstance=L.map("famMap",{scrollWheelZoom:false});
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
      attribution:'© OpenStreetMap',maxZoom:18
    }).addTo(mapInstance);
    const bounds=[];
    placed.forEach(e=>{
      const color=e.members.length===1?M[e.members[0]].raw:M.vsichni.raw;
      const marker=L.circleMarker([e.lat,e.lng],{
        radius:9,fillColor:color,color:"#fff",weight:2,fillOpacity:.95
      }).addTo(mapInstance);
      const who=e.members.map(id=>M[id].name).join(", ");
      const thumb=(e.photos&&e.photos[0])?`<br><img src="${e.photos[0]}" style="width:100%;max-width:160px;border-radius:6px;margin-top:6px">`:"";
      marker.bindPopup(`<b>${escapeHtml(e.title)}</b><br>${rangeLabel(e)} · ${escapeHtml(e.place||"")}<br><span style="color:#888">${who}</span>${thumb}`);
      bounds.push([e.lat,e.lng]);
    });
    if(bounds.length===1)mapInstance.setView(bounds[0],12);
    else mapInstance.fitBounds(bounds,{padding:[40,40],maxZoom:13});
  },60);
}
function escapeHtml(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- filters ---------- */
function renderFilters(){
  let html=`<button class="chip ${filter==='all'?'active':''}" data-f="all" style="${filter==='all'?'background:var(--ink)':''}">Všechny</button>`;
  MEMBERS.forEach(m=>{
    const act=filter===m.id;
    html+=`<button class="chip ${act?'active':''}" data-f="${m.id}" style="${act?'background:'+m.raw:''}">
      <span class="cd" style="background:${m.raw}"></span>${m.name}</button>`;
  });
  $("#filters").innerHTML=html;
  $("#filters").querySelectorAll(".chip").forEach(c=>{
    c.addEventListener("click",()=>{filter=c.dataset.f;renderFilters();render();});
  });
}

/* ---------- event sheet ---------- */
function refreshWhoPickUI(){
  $("#whoPick").querySelectorAll("button").forEach((b,i)=>{
    b.classList.toggle("sel",draftMembers.includes(MEMBERS[i].id));
  });
}

function openNew(date){
  editing=null;draftPhotos=[];
  draftMembers=me?[me]:[];
  $("#evTitle").textContent="Nová aktivita";
  $("#fTitle").value="";$("#fDate").value=date||todayIso;$("#fTime").value="";$("#fNote").value="";
  $("#fPlace").value="";$("#fEndDate").value="";$("#endWrap").style.display="none";$("#dtoLabel").textContent="+ víc dní";
  $("#placeHint").textContent="";$("#placeHint").className="placehint";
  $("#delBtn").style.display="none";
  buildWhoPick();renderPhotos();
  $("#evOverlay").classList.add("open");
  setTimeout(()=>$("#fTitle").focus(),250);
}
function openEvent(e){
  if(!e)return;
  editing=e;draftPhotos=[...(e.photos||[])];draftMembers=[...e.members];
  $("#evTitle").textContent="Upravit aktivitu";
  $("#fTitle").value=e.title;$("#fDate").value=e.date;$("#fTime").value=e.time||"";$("#fNote").value=e.note||"";
  $("#fPlace").value=e.place||"";
  $("#placeHint").textContent=(e.lat!=null)?"📍 Uloženo na mapě":"";$("#placeHint").className="placehint"+(e.lat!=null?" ok":"");
  if(e.end_date&&e.end_date>e.date){$("#fEndDate").value=e.end_date;$("#endWrap").style.display="block";$("#dtoLabel").textContent="skrýt konec";}
  else{$("#fEndDate").value="";$("#endWrap").style.display="none";$("#dtoLabel").textContent="+ víc dní";}
  $("#delBtn").style.display="block";
  buildWhoPick();renderPhotos();
  $("#evOverlay").classList.add("open");
}
function buildWhoPick(){
  const c=$("#whoPick");c.innerHTML="";
  MEMBERS.forEach(m=>{
    const b=document.createElement("button");
    b.innerHTML=`<span class="av" style="background:${m.raw}">${m.short}</span>${m.name}`;
    b.className=draftMembers.includes(m.id)?"sel":"";
    b.onclick=()=>{
      if(draftMembers.includes(m.id))draftMembers=draftMembers.filter(x=>x!==m.id);
      else draftMembers.push(m.id);
      refreshWhoPickUI();
    };
    c.appendChild(b);
  });
}
function renderPhotos(){
  const row=$("#photoRow");
  row.querySelectorAll(".photo-thumb").forEach(n=>n.remove());
  const add=$("#addPhoto");
  draftPhotos.forEach((p,i)=>{
    const d=document.createElement("div");d.className="photo-thumb";
    d.innerHTML=`<img src="${p}"><button class="rm" data-i="${i}">×</button>`;
    d.querySelector(".rm").onclick=()=>{draftPhotos.splice(i,1);renderPhotos();};
    row.insertBefore(d,add);
  });
}
$("#addPhoto").onclick=()=>$("#fileInput").click();
$("#fileInput").onchange=async ev=>{
  for(const file of ev.target.files){
    const data=await compress(file);
    draftPhotos.push(data);
  }
  renderPhotos();
  ev.target.value="";
};
function compress(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const max=900;let{width:w,height:h}=img;
        if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
        const cv=document.createElement("canvas");cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        res(cv.toDataURL("image/jpeg",.72));
      };
      img.src=r.result;
    };
    r.readAsDataURL(file);
  });
}

// geocode place name -> {lat,lng} via OpenStreetMap Nominatim (free, no key)
async function geocode(q){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`,{headers:{"Accept-Language":"cs"}});
    const j=await r.json();
    if(j&&j.length)return {lat:parseFloat(j[0].lat),lng:parseFloat(j[0].lon)};
  }catch(e){console.error("geocode",e);}
  return null;
}

async function saveEvent(){
  const title=$("#fTitle").value.trim();
  if(!title){toast("Napiš název aktivity");return;}
  if(!draftMembers.length){toast("Vyber, koho se týká");return;}
  const date=$("#fDate").value;
  let end_date=$("#endWrap").style.display!=="none" ? $("#fEndDate").value : "";
  if(end_date&&end_date<date){toast("Konec nemůže být před začátkem");return;}
  const place=$("#fPlace").value.trim();

  // resolve coordinates: reuse if place unchanged, else geocode
  let lat=null,lng=null;
  if(place){
    if(editing&&editing.place===place&&editing.lat!=null){lat=editing.lat;lng=editing.lng;}
    else{
      $("#saveBtn").textContent="Hledám místo…";
      const g=await geocode(place);
      if(g){lat=g.lat;lng=g.lng;}
      else toast("Místo se nenašlo, uložím bez mapy");
    }
  }

  const payload={
    title,date,end_date,time:$("#fTime").value,
    members:[...draftMembers],note:$("#fNote").value.trim(),photos:[...draftPhotos],
    stars: editing ? (editing.stars||0) : 0,
    place, lat, lng
  };
  $("#saveBtn").textContent="Ukládám…";
  if(editing){
    payload.id=editing.id;
    if(await persistUpdate(payload)){
      const i=events.findIndex(e=>e.id===editing.id);if(i>=0)events[i]=payload;
      closeSheet();toast("Uloženo ✓");render();
    }
  }else{
    const saved=await persistAdd(payload);
    if(saved){events.push(saved);closeSheet();toast("Přidáno ✓");render();}
  }
  $("#saveBtn").textContent="Uložit";
}
async function deleteEvent(){
  if(!editing)return;
  if(!confirm("Opravdu smazat tuto aktivitu?"))return;
  await persistDelete(editing.id);
  events=events.filter(e=>e.id!==editing.id);
  closeSheet();toast("Smazáno");render();
}
function closeSheet(){$("#evOverlay").classList.remove("open");}

/* ---------- who am i ---------- */
function buildMePick(){
  const c=$("#meWhoPick");c.innerHTML="";
  MEMBERS.filter(m=>m.id!=="vsichni").forEach(m=>{
    const b=document.createElement("button");
    b.innerHTML=`<span class="av" style="background:${m.raw}">${m.short}</span>${m.name}`;
    b.className=me===m.id?"sel":"";
    b.onclick=()=>{me=m.id;buildMePick();};
    c.appendChild(b);
  });
}
function refreshMeBtn(){
  if(me){const m=M[me];$("#meDot").textContent=m.short;$("#meDot").style.background=m.raw;$("#meName").textContent=m.name;}
  else{$("#meDot").textContent="?";$("#meDot").style.background="var(--muted)";$("#meName").textContent="Kdo jsem";}
}

/* ---------- events wiring ---------- */
$("#fab").onclick=()=>openNew();
$("#cancelBtn").onclick=closeSheet;
$("#saveBtn").onclick=saveEvent;
$("#delBtn").onclick=deleteEvent;
$("#evOverlay").onclick=e=>{if(e.target.id==="evOverlay")closeSheet();};
$("#prevM").onclick=()=>{cur=new Date(cur.getFullYear(),cur.getMonth()-1,1);render();};
$("#nextM").onclick=()=>{cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);render();};
$("#vMonth").onclick=()=>{view="month";setActiveView("vMonth");render();};
$("#vList").onclick=()=>{view="list";setActiveView("vList");render();};
$("#vMemories").onclick=()=>{view="memories";setActiveView("vMemories");render();};
$("#vMap").onclick=()=>{view="map";setActiveView("vMap");render();};
function setActiveView(id){["vMonth","vList","vMemories","vMap"].forEach(v=>$("#"+v).classList.toggle("active",v===id));}

// date range toggle
$("#dtoToggle").onclick=()=>{
  const w=$("#endWrap");
  if(w.style.display==="none"){
    w.style.display="block";$("#dtoLabel").textContent="skrýt konec";
    if(!$("#fEndDate").value)$("#fEndDate").value=$("#fDate").value;
  }else{
    w.style.display="none";$("#fEndDate").value="";$("#dtoLabel").textContent="+ víc dní";
  }
};
// live place hint while typing (debounced)
let placeTimer=null;
$("#fPlace").addEventListener("input",()=>{
  clearTimeout(placeTimer);
  const v=$("#fPlace").value.trim();
  const h=$("#placeHint");
  if(!v){h.textContent="";h.className="placehint";return;}
  h.textContent="Místo se ověří při uložení…";h.className="placehint";
});
$("#lbClose").onclick=()=>$("#lightbox").classList.remove("open");
$("#lightbox").onclick=e=>{if(e.target.id==="lightbox")$("#lightbox").classList.remove("open");};
$("#meBtn").onclick=()=>{buildMePick();$("#whoOverlay").classList.add("open");};
$("#meSaveBtn").onclick=()=>{localStorage.setItem("famcal_me",me);refreshMeBtn();$("#whoOverlay").classList.remove("open");toast(me?"Nastaveno":"");};
$("#whoOverlay").onclick=e=>{if(e.target.id==="whoOverlay")$("#whoOverlay").classList.remove("open");};

/* ---------- boot ---------- */
(async function(){
  renderFilters();
  refreshMeBtn();
  await initStore();
  render();
})();
</script>
